# External Secrets Operator — install the operator via Helm first:
# helm repo add external-secrets https://charts.external-secrets.io
# helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Then create a SecretStore pointing to AWS Secrets Manager:

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: gym
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gym-secrets
  namespace: gym
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: gym-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: gym-app/production
        property: SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: gym-app/production
        property: DATABASE_URL
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: gym-app/production
        property: STRIPE_SECRET_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: gym-app/production
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: gym-app/production
        property: RESEND_API_KEY
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: gym-app/production
        property: GROQ_API_KEY
    - secretKey: SENTRY_DSN
      remoteRef:
        key: gym-app/production
        property: SENTRY_DSN
