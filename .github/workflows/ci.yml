# Continuous integration — validate code, images, and local stack.
#
# Structure:
#   1. validate (parallel) — Kubernetes manifests
#   2. backend-tests, frontend-build (parallel) — fast feedback
#   3. docker-build — after k8s + app checks (fail fast: bad manifests skip image builds)
#   4. compose-smoke — same gate, parallel with docker-build
#   5. ci-success — single required check for branch protection
#
# Security: minimal GITHUB_TOKEN scopes; no repo secrets in this workflow; explicit env for compose.

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  # Docker Buildx GHA cache (cache-from/cache-to type=gha)
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # PR pushes: cancel superseded runs. main: allow concurrent runs to finish (release tagging, etc.).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  KUBECTL_VERSION: 'v1.30.0'
  # Non-default test secret (startup guard rejects change-me-in-production)
  CI_SECRET_KEY: ci-workflow-secret-key-minimum-32-characters-long

jobs:
  k8s-validate:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Kustomize render
        run: kubectl kustomize k8s/base >/dev/null

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SECRET_KEY: ${{ env.CI_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

  docker-build:
    name: Docker images (build only)
    runs-on: ubuntu-latest
    needs:
      - k8s-validate
      - backend-tests
      - frontend-build
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: gym-tracker-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: gym-tracker-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs:
      - k8s-validate
      - backend-tests
      - frontend-build
    timeout-minutes: 20
    env:
      SECRET_KEY: ${{ env.CI_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack and wait for healthy services
        run: |
          set -euo pipefail
          docker compose up -d --build --wait --wait-timeout 120

      - name: Verify HTTP endpoints
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8000/health >/dev/null
          curl -fsS http://localhost:5173 >/dev/null

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - k8s-validate
      - backend-tests
      - frontend-build
      - docker-build
      - compose-smoke
    timeout-minutes: 2
    if: success()

    steps:
      - name: Done
        run: echo "All CI jobs completed successfully."
