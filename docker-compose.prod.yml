# Production Docker Compose — extends the base compose with production settings.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

  backend:
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      LOG_LEVEL: WARNING
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@forgemode.app}
      APP_URL: ${APP_URL:-https://app.forgemode.app}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports: !reset []
    expose:
      - '8000'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    restart: always
    ports: !reset []
    expose:
      - '80'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
